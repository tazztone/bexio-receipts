<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Review Receipt</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <style>
        .split-view {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            align-items: start;
        }
        .receipt-image {
            width: 100%;
            max-height: 80vh;
            object-fit: contain;
            border: 1px solid #ccc;
        }
        .error-list {
            background-color: #fff1f1;
            padding: 1rem;
            border-left: 5px solid #ff4444;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <header class="container">
        <nav>
            <ul>
                <li><strong>bexio-receipts</strong></li>
            </ul>
            <ul>
                <li><a href="/">Dashboard</a></li>
            </ul>
        </nav>
    </header>
    <main class="container">
        <h1>Review Receipt</h1>
        
        <div class="split-view">
            <!-- Left: Image -->
            <div>
                <img src="/image/{{ id }}" class="receipt-image" alt="Receipt">
            </div>

            <!-- Right: Form -->
            <div>
                {% if data.errors %}
                <div class="error-list">
                    <strong>Errors found:</strong>
                    <ul>
                    {% for err in data.errors %}
                        <li>{{ err }}</li>
                    {% endfor %}
                    </ul>
                </div>
                {% endif %}

                <form action="/push/{{ id }}" method="POST">
                    <label for="merchant_name">Merchant Name</label>
                    <input type="text" name="merchant_name" value="{{ receipt.merchant_name or '' }}" required>

                    <label for="date">Date (YYYY-MM-DD)</label>
                    <input type="date" name="date" value="{{ receipt.date or '' }}" required>

                    <label for="total_incl_vat">Total (CHF)</label>
                    <input type="number" step="0.01" name="total_incl_vat" value="{{ receipt.total_incl_vat or 0.0 }}" required>

                    <label for="vat_rate_pct">VAT Rate (%)</label>
                    <select name="vat_rate_pct">
                        <option value="8.1" {% if receipt.vat_rate_pct == 8.1 %}selected{% endif %}>8.1% (Standard)</option>
                        <option value="2.6" {% if receipt.vat_rate_pct == 2.6 %}selected{% endif %}>2.6% (Reduced)</option>
                        <option value="3.8" {% if receipt.vat_rate_pct == 3.8 %}selected{% endif %}>3.8% (Accommodation)</option>
                        <option value="0.0" {% if receipt.vat_rate_pct == 0.0 %}selected{% endif %}>0.0% (Exempt)</option>
                    </select>

                    <div class="grid">
                        <button type="submit">Push to bexio</button>
                        <button type="button" class="secondary outline" 
                                onclick="if(confirm('Are you sure you want to discard this?')) { document.getElementById('discard-form').submit(); }">
                            Discard
                        </button>
                    </div>
                </form>

                <form id="discard-form" action="/discard/{{ id }}" method="POST" style="display: none;"></form>
                
                <hr>
                <details>
                    <summary>Original OCR Text</summary>
                    <pre style="font-size: 0.8rem; background: #f4f4f4; padding: 1rem;">{{ data.ocr_text }}</pre>
                </details>
            </div>
        </div>
    </main>
</body>
</html>
