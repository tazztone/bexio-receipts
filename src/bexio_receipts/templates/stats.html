<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bexio-receipts Stats</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
</head>
<body>
    <header class="container">
        <nav>
            <ul>
                <li><strong>bexio-receipts</strong></li>
            </ul>
            <ul>
                <li><a href="/">Dashboard</a></li>
                <li><a href="/stats">Stats</a></li>
            </ul>
        </nav>
    </header>
    <main class="container">
        <h1>Processing Statistics</h1>
        
        <article>
            <div class="grid">
                <div>
                    <h5>Total Processed</h5>
                    <p style="font-size: 2rem; font-weight: bold;">{{ stats.total_processed }}</p>
                    <small>Receipts booked or duplicated</small>
                </div>
                <div>
                    <h5>Pipeline Status</h5>
                    <p>Live & Operational</p>
                </div>
            </div>
        </article>
    </main>
</body>
</html>
