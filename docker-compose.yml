services:
  app:
    build: .
    volumes:
      - ./src/bexio_receipts:/app/src/bexio_receipts
      - ./src/bexio_receipts/templates:/app/src/bexio_receipts/templates
      - ./tests:/app/tests
      - ./inbox:/app/inbox
      - ./review_queue:/app/review_queue
      - ./processed_receipts.db:/app/processed_receipts.db
    environment:
      - BEXIO_API_TOKEN=${BEXIO_API_TOKEN:-test_token}
      - BEXIO_BASE_URL=http://mock-bexio:8001
      - REVIEW_PASSWORD=${REVIEW_PASSWORD:-admin}
      - SECRET_KEY=${SECRET_KEY:-super-secret-key-change-me-in-prod}
      - GLM_OCR_URL=http://host.docker.internal:11434
      - OLLAMA_URL=http://host.docker.internal:11434
      - GLM_OCR_MODEL=glm-ocr
      - LLM_PROVIDER=ollama
      - LLM_MODEL=qwen3.5
      - OCR_ENGINE=glm-ocr
      - DEFAULT_BOOKING_ACCOUNT_ID=100
      - DEFAULT_BANK_ACCOUNT_ID=200
    ports:
      - "8000:8000"
    command: ["bexio-receipts", "serve", "--host", "0.0.0.0"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - mock-bexio

  watcher:
    build: .
    volumes:
      - ./src/bexio_receipts:/app/src/bexio_receipts
      - ./src/bexio_receipts/templates:/app/src/bexio_receipts/templates
      - ./tests:/app/tests
      - ./inbox:/app/inbox
      - ./review_queue:/app/review_queue
      - ./processed_receipts.db:/app/processed_receipts.db
    environment:
      - BEXIO_API_TOKEN=${BEXIO_API_TOKEN:-test_token}
      - BEXIO_BASE_URL=http://mock-bexio:8001
      - REVIEW_PASSWORD=${REVIEW_PASSWORD:-admin}
      - SECRET_KEY=${SECRET_KEY:-super-secret-key-change-me-in-prod}
      - GLM_OCR_URL=http://host.docker.internal:11434
      - OLLAMA_URL=http://host.docker.internal:11434
      - GLM_OCR_MODEL=glm-ocr
      - LLM_PROVIDER=ollama
      - LLM_MODEL=qwen3.5
      - OCR_ENGINE=glm-ocr
      - DEFAULT_BOOKING_ACCOUNT_ID=100
      - DEFAULT_BANK_ACCOUNT_ID=200
    command: ["bexio-receipts", "watch", "folder"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - mock-bexio

  mock-bexio:
    build: .
    volumes:
      - ./src/bexio_receipts:/app/src/bexio_receipts
      - ./src/bexio_receipts/templates:/app/src/bexio_receipts/templates
      - ./tests:/app/tests
    ports:
      - "8001:8001"
    command: ["python", "tests/mock_bexio.py"]

volumes:
  ollama_data:
